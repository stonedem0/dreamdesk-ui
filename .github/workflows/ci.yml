name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck core
        working-directory: packages/core
        run: pnpm typecheck

      - name: Test core
        working-directory: packages/core
        run: pnpm test

      - name: Build core
        working-directory: packages/core
        run: pnpm build

      - name: Build react
        working-directory: packages/react
        run: pnpm build
