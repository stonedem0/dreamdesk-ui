name: Release to npm

on:
  workflow_run:
    workflows: ["Cut Release (create tag and GitHub Release)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      distTag:
        description: "Optional npm dist-tag (default: auto — latest for >=1.x, next for 0.x)"
        required: false
        default: ""

jobs:
  publish:
    name: Publish packages
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Resolve version and dist-tag
        id: ver
        run: |
          git fetch --tags --force
          TAG=""
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
          fi
          if [ -z "$TAG" ]; then TAG=$(git describe --tags --exact-match 2>/dev/null || true); fi
          if [ -z "$TAG" ]; then TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1); fi
          VER="${TAG#v}"
          INPUT="${{ github.event.inputs.distTag }}"
          if [ -n "$INPUT" ]; then DIST="$INPUT"
          elif [[ "$VER" == 0.* ]]; then DIST="next"
          else DIST="latest"; fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "dist_tag=$DIST" >> $GITHUB_OUTPUT
          echo "Resolved: $TAG → npm tag=$DIST"

      - name: Sync package versions
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          node -e "
            const fs = require('fs'), ver = process.env.VER;
            ['packages/core/package.json', 'packages/react/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = ver;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg.name, '->', ver);
            });
          "

      - name: Remove unpublished workspace deps before install
        run: |
          node -e "
            const fs = require('fs');
            const p = 'packages/react/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            // @dreamdesk/core is aliased to local source in vite config — not needed installed
            delete pkg.dependencies['@dreamdesk/core'];
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build packages
        run: pnpm run build

      - name: Assemble root package for publish
        run: |
          # JS + types + style from react build
          cp -r packages/react/dist dist
          # Theme CSS files from core
          mkdir -p css
          cp packages/core/css/*.css css/

      - name: Preview tarball
        run: npm pack --dry-run

      - name: Publish dreamdesk-ui
        run: npm publish --access public --tag ${{ steps.ver.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
