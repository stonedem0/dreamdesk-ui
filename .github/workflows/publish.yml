name: Release to npm

on:
  workflow_run:
    workflows: ["Cut Release (create tag and GitHub Release)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      distTag:
        description: "Optional npm dist-tag (default: auto: next for 0.x, latest otherwise)"
        required: false
        default: ""

jobs:
  publish:
    name: Publish package
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install (if needed)
        run: |
          npm ci --ignore-scripts || echo "No dependencies to install"

      - name: Preview tarball
        run: npm pack --dry-run

      - name: Checkout latest semver tag (v*)
        run: |
          set -e
          git fetch --tags --force
          # Prefer a tag pointing at the triggering workflow_run commit
          TAG=$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
          # Fallback to the most recent semver tag
          if [ -z "$TAG" ]; then
            TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1 || true)
          fi
          if [ -n "$TAG" ]; then
            echo "Publishing from tag $TAG"
            git checkout --quiet "$TAG"
          else
            echo "No v* tag found; continuing on current ref"
          fi

      - name: Resolve dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          INPUT_TAG="${{ github.event.inputs.distTag }}"
          if [ -n "$INPUT_TAG" ]; then TAG="$INPUT_TAG";
          elif [[ "$VERSION" == 0.* ]]; then TAG="next";
          else TAG="latest"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

