name: Cut Release (create tag and GitHub Release)

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "semver bump: patch | minor | major"
        required: true
        default: patch

jobs:
  cut:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and sync packages
        id: bump
        run: |
          # Bump root without committing so we can amend package files into the same commit
          NEW_VER=$(npm version ${{ github.event.inputs.releaseType }} --no-git-tag-version)
          NEW_VER="${NEW_VER#v}"

          # Sync to individual packages
          node -e "
            const fs = require('fs'), ver = '$NEW_VER';
            ['packages/core/package.json', 'packages/react/package.json'].forEach(p => {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = ver;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              console.log(pkg.name, '->', ver);
            });
          "

          # Single commit + annotated tag covering all three package.json files
          git add package.json packages/core/package.json packages/react/package.json
          git commit -m "chore(release): v${NEW_VER}"
          git tag -a "v${NEW_VER}" -m "v${NEW_VER}"

          echo "version=${NEW_VER}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VER}" >> $GITHUB_OUTPUT

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generateReleaseNotes: true
